url: https://adrientaudiere.github.io/tidypq/
template:
  bootstrap: 5
  bslib:
    bg: "#ECD6BA"
    fg: "#160a04"
    primary: "#b13c00"
    secondary: "#3a2410"

reference:
- title: Sample-scale verbs
  desc: Filter, select, mutate, slice, arrange, and rename samples.
  contents:
  - filter_samples_pq
  - select_samdata_pq
  - mutate_samdata_pq
  - slice_samples_pq
  - arrange_samples_pq
  - rename_samples_pq

- title: Taxa-scale verbs
  desc: Filter, select, mutate, slice, arrange, and rename taxa.
  contents:
  - filter_taxa_pq
  - select_taxa_pq
  - mutate_taxa_pq
  - slice_taxa_pq
  - arrange_taxa_pq
  - rename_taxa_pq

- title: Occurrence-scale verbs
  desc: Filter and transform OTU table values.
  contents:
  - filter_occurrences_pq
  - mutate_occurrences_pq

- title: Tree-scale verbs
  desc: Filter phylogenetic trees.
  contents:
  - filter_tree_pq

- title: Helpers
  desc: Utility functions for common operations.
  contents:
  - taxa_prevalence

- title: Decontamination
  desc: Remove contaminants using negative controls or control taxa.
  contents:
  - decontam_sam_control
  - decontam_taxa_control

- title: Chimera detection
  desc: Detect and benchmark chimeric sequences.
  contents:
  - chimera_removal_dada2
  - chimera_removal_vs_ref
  - create_chimera_pq

- title: Primer contamination
  desc: Detect and remove taxa whose representative sequence embeds a primer (requires Biostrings).
  contents:
  - identify_taxa_primer_pq
  - filter_taxa_primer_pq

- title: Contaminant detection & negative controls
  desc: Flag, classify and diagnose contaminant taxa.
  contents:
  - contam_blocklist_pq
  - contam_corr_pq
  - known_contaminant_genera
  - neg_control_classify_pq
  - neg_control_diag_pq
  - neg_control_clean_pq

