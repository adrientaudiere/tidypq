url: https://adrientaudiere.github.io/tidypq/
template:
  bootstrap: 5
  bslib:
    bg: "#ECD6BA"
    fg: "#160a04"
    primary: "#b13c00"
    secondary: "#3a2410"

reference:
- title: Sample-scale verbs
  desc: Filter, select, mutate, slice, arrange, and rename samples.
  contents:
  - filter_samples_pq
  - select_samdata_pq
  - mutate_samdata_pq
  - slice_samples_pq
  - arrange_samples_pq
  - rename_samples_pq

- title: Taxa-scale verbs
  desc: Filter, select, mutate, slice, arrange, and rename taxa.
  contents:
  - filter_taxa_pq
  - select_taxa_pq
  - mutate_taxa_pq
  - slice_taxa_pq
  - arrange_taxa_pq
  - rename_taxa_pq

- title: Occurrence-scale verbs
  desc: Filter and transform OTU table values.
  contents:
  - filter_occurrences_pq
  - mutate_occurrences_pq

- title: Tree-scale verbs
  desc: Filter phylogenetic trees.
  contents:
  - filter_tree_pq

- title: Tidy conversion
  desc: Convert a phyloseq object into a tidy tibble.
  contents:
  - pq_to_tidy

- title: Helpers
  desc: Utility functions for common operations.
  contents:
  - taxa_prevalence

- title: Contaminant detectors
  desc: >
    Flag suspect taxa; each returns a contam_tbl consumed by
    filter_contam_pq().
  contents:
  - identify_contam_blocklist_pq
  - identify_contam_chimera_pq
  - identify_contam_corr_pq
  - identify_contam_negcontrol_pq
  - identify_contam_primer_pq
  - known_contaminant_genera

- title: Contaminant removal and the contam_tbl object
  desc: Remove flagged taxa and work with the detector output object.
  contents:
  - filter_contam_pq
  - filter_chimera_pq
  - contam_tbl
  - print.contam_tbl
  - rbind.contam_tbl
  - autoplot.contam_tbl

- title: Control-based decontamination
  desc: >
    Zero out occurrences below a background level estimated from control
    samples or control taxa.
  contents:
  - decontam_control_samples_pq
  - decontam_control_taxa_pq

- title: Cross-talk (tag-jump) filtering
  desc: >
    Detect, visualise, and remove per-cell cross-talk (tag-switching) with the
    UNCROSS2 score.
  contents:
  - uncross2_pq
  - plot_uncross2_scores

- title: Chimera utilities
  desc: Generate synthetic chimeras for benchmarking detectors.
  contents:
  - create_chimera_pq

